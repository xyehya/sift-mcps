name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  UV_NO_PROGRESS: "1"

jobs:
  lint:
    name: Ruff lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: .python-version

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock
            packages/*/pyproject.toml

      - name: Install dependencies
        run: |
          uv sync --locked \
            --extra full \
            --extra opencti \
            --extra windows-triage \
            --extra dev

      - name: Ruff undefined-name guard
        run: |
          uv run --locked --extra full --extra dev ruff check \
            --target-version py311 \
            --select F821,F822,F823 \
            .

      - name: Ruff clean source packages
        run: |
          uv run --locked --extra full --extra dev ruff check \
            packages/case-dashboard/src \
            packages/forensic-knowledge/src \
            packages/sift-common/src

  typecheck:
    name: Pyright typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: .python-version

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock
            packages/*/pyproject.toml

      - name: Install dependencies
        run: |
          uv sync --locked \
            --extra full \
            --extra opencti \
            --extra windows-triage \
            --extra dev

      - name: Pyright sift-gateway policy layer
        run: uv run --locked --extra full --extra dev pyright -p pyrightconfig.json

  test:
    name: Pytest full suite
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: .python-version

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock
            packages/*/pyproject.toml

      - name: Install dependencies
        run: |
          uv sync --locked \
            --extra full \
            --extra opencti \
            --extra windows-triage \
            --extra dev

      - name: Run full test suite
        # No positional path arg — pytest reads testpaths=['tests','packages'] from
        # pyproject.toml, so all 221+ files (root + every package) are included.
        run: |
          uv run --locked \
            --extra full \
            --extra opencti \
            --extra windows-triage \
            --extra dev \
            pytest

  coverage:
    name: Package coverage floors
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: .python-version

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock
            packages/*/pyproject.toml

      - name: Install dependencies
        run: |
          uv sync --locked \
            --extra full \
            --extra opencti \
            --extra windows-triage \
            --extra dev

      - name: Check per-package coverage floors
        run: |
          uv run --locked \
            --extra full \
            --extra opencti \
            --extra windows-triage \
            --extra dev \
            python scripts/check_package_coverage.py

  docs:
    name: Docs freshness
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: .python-version

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock
            packages/*/pyproject.toml

      - name: Install dependencies
        run: |
          uv sync --locked \
            --extra full \
            --extra opencti \
            --extra windows-triage \
            --extra dev

      - name: Check new-docs cross-references
        run: uv run --locked --extra full --extra dev python scripts/check_newdocs_refs.py

  portal-dist:
    # G8: the gateway mounts a COMMITTED frontend build (no node on the install
    # VM). Guard against a stale dist by rebuilding from source and failing if
    # the committed static/v2 differs from a fresh build.
    name: Portal dist freshness
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version-file: packages/case-dashboard/frontend/package.json
          cache: npm
          cache-dependency-path: packages/case-dashboard/frontend/package-lock.json

      - name: Check committed portal dist is fresh
        run: bash scripts/check-portal-dist.sh
