# OpenCTI stack — optional reference add-on, prepared via scripts/setup-addon.sh
#
# Uses its own Docker network and OpenSearch datastore. It must not write
# OpenCTI platform indices into the native SIFT forensic OpenSearch cluster.
#
# Bring up:  OPENCTI_ADMIN_TOKEN=<uuid> docker compose -f docker-compose.opencti.yml up -d
# Tear down: docker compose -f docker-compose.opencti.yml down
#
# All services are stateless except the volumes below. opencti-mcp in
# sift-gateway authenticates to the platform using OPENCTI_ADMIN_TOKEN.

services:
  opencti-opensearch:
    image: opensearchproject/opensearch:3.5.0
    container_name: sift-opencti-opensearch
    restart: unless-stopped
    networks:
      - opencti-net
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - OPENSEARCH_JAVA_OPTS=-Xms2g -Xmx2g
      - thread_pool.search.queue_size=5000
    volumes:
      - opencti-opensearch-data:/usr/share/opensearch/data
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sf http://localhost:9200/_cluster/health | grep -v '\"status\":\"red\"'",
        ]
      interval: 30s
      timeout: 10s
      retries: 10

  redis:
    image: redis:7.4
    container_name: sift-opencti-redis
    restart: unless-stopped
    networks:
      - opencti-net
    volumes:
      - opencti-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:4.0-management
    container_name: sift-opencti-rabbitmq
    restart: unless-stopped
    networks:
      - opencti-net
    volumes:
      - opencti-rabbitmq:/var/lib/rabbitmq
    environment:
      - RABBITMQ_DEFAULT_USER=opencti
      - RABBITMQ_DEFAULT_PASS=${OPENCTI_ADMIN_TOKEN}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: sift-opencti-minio
    restart: unless-stopped
    networks:
      - opencti-net
    volumes:
      - opencti-minio:/data
    environment:
      - MINIO_ROOT_USER=opencti
      - MINIO_ROOT_PASSWORD=${OPENCTI_ADMIN_TOKEN}
    command: server /data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  opencti:
    image: opencti/platform:latest
    container_name: sift-opencti
    restart: unless-stopped
    networks:
      - opencti-net
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      - NODE_OPTIONS=--max-old-space-size=4096
      - APP__PORT=8080
      - APP__BASE_URL=http://localhost:8080
      - APP__ADMIN__EMAIL=admin@sift.local
      - APP__ADMIN__PASSWORD=${OPENCTI_ADMIN_TOKEN}
      - APP__ADMIN__TOKEN=${OPENCTI_ADMIN_TOKEN}
      - APP__ENCRYPTION_KEY=${OPENCTI_ENCRYPTION_KEY}
      - APP__HEALTH_ACCESS_KEY=${OPENCTI_HEALTH_ACCESS_KEY}
      - APP__APP_LOGS__LOGS_LEVEL=error
      # Search backend — isolated OpenCTI datastore, not the SIFT evidence cluster.
      - ELASTICSEARCH__URL=http://opencti-opensearch:9200
      - ELASTICSEARCH__ENGINE_SELECTOR=opensearch
      - ELASTICSEARCH__INDEX_PREFIX=opencti
      - ELASTICSEARCH__NUMBER_OF_SHARDS=1
      - ELASTICSEARCH__NUMBER_OF_REPLICAS=0
      # Redis
      - REDIS__HOSTNAME=redis
      - REDIS__PORT=6379
      # RabbitMQ
      - RABBITMQ__HOSTNAME=rabbitmq
      - RABBITMQ__PORT=5672
      - RABBITMQ__USERNAME=opencti
      - RABBITMQ__PASSWORD=${OPENCTI_ADMIN_TOKEN}
      # MinIO / S3
      - MINIO__ENDPOINT=minio
      - MINIO__PORT=9000
      - MINIO__USE_SSL=false
      - MINIO__ACCESS_KEY=opencti
      - MINIO__SECRET_KEY=${OPENCTI_ADMIN_TOKEN}
    depends_on:
      opencti-opensearch:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e 'const http=require(\"http\");const key=process.env.APP__HEALTH_ACCESS_KEY;http.get(\"http://localhost:8080/health?health_access_key=\"+encodeURIComponent(key),r=>process.exit(r.statusCode===200?0:1)).on(\"error\",()=>process.exit(1));'",
        ]
      interval: 20s
      timeout: 10s
      retries: 20
      start_period: 120s

  worker:
    image: opencti/worker:latest
    restart: unless-stopped
    networks:
      - opencti-net
    environment:
      - OPENCTI_URL=http://opencti:8080
      - OPENCTI_TOKEN=${OPENCTI_ADMIN_TOKEN}
      - WORKER_LOG_LEVEL=error
    deploy:
      replicas: 2
    depends_on:
      opencti:
        condition: service_healthy

volumes:
  opencti-opensearch-data:
  opencti-redis:
  opencti-rabbitmq:
  opencti-minio:

networks:
  opencti-net:
    name: sift-opencti-net
