services:
  opensearch:
    image: opensearchproject/opensearch:3.5.0
    container_name: sift-opensearch
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - OPENSEARCH_JAVA_OPTS=-Xms4g -Xmx4g
      - path.repo=/usr/share/opensearch/snapshots
      - thread_pool.search.queue_size=5000
    volumes:
      - opensearch-data:/usr/share/opensearch/data
      - /var/lib/sift/snapshots:/usr/share/opensearch/snapshots
    ports:
      - "127.0.0.1:9200:9200"
    networks:
      - sift-net
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sf http://localhost:9200/_cluster/health | grep -v '\"status\":\"red\"'",
        ]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  opensearch-data:

networks:
  sift-net:
    name: sift-net
