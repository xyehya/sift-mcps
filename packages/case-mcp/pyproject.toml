[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "case-mcp"
version = "0.6.1"
description = "Valhuntir case management MCP server"
requires-python = ">=3.10"
license = {text = "MIT"}
authors = [{name = "AppliedIncidentResponse.com"}]
keywords = ["mcp", "forensics", "case-management", "dfir"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Security",
]
dependencies = [
    "agentir-core",
    "sift-common",
    "mcp>=1.26",
    "pyyaml>=6.0",
]

[project.scripts]
case-mcp = "case_mcp.server:main"

[tool.hatch.build.targets.wheel]
packages = ["src/case_mcp"]
