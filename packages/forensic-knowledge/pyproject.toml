[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"

[project]
name = "forensic-knowledge"
dynamic = ["version"]
description = "Community-curated forensic artifact, tool, and discipline knowledge — YAML-backed, pip-installable"
requires-python = ">=3.10"
license = {text = "MIT"}
authors = [
    {name = "AppliedIncidentResponse.com"},
]
keywords = ["forensics", "incident-response", "dfir", "artifacts", "knowledge-base"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Intended Audience :: Information Technology",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Security",
]
dependencies = [
    "pyyaml>=6.0",
]

[project.urls]
Homepage = "https://github.com/AppliedIR/sift-mcp/tree/main/packages/forensic-knowledge"
Repository = "https://github.com/AppliedIR/sift-mcp"

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-cov>=4.0",
]

# Version single source of truth (#15/I-PS1): derived from the git release tag
# via hatch-vcs — no hand-edited literal. See root pyproject.toml for the full
# rationale; `--match v*` ignores the repo's non-PEP440 tags.
[tool.hatch.version]
source = "vcs"
fallback-version = "0.6.2"
tag-pattern = "^v(?P<version>\\d+\\.\\d+\\.\\d+.*)$"

[tool.hatch.version.raw-options]
git_describe_command = ["git", "describe", "--dirty", "--tags", "--long", "--match", "v*"]

[tool.hatch.build.targets.wheel]
packages = ["src/forensic_knowledge"]

[tool.hatch.build.targets.wheel.force-include]
"data" = "forensic_knowledge/data"

[tool.hatch.build.targets.sdist]
include = ["src/", "data/", "tests/", "README.md", "LICENSE"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.coverage.run]
source = ["src/forensic_knowledge"]
branch = true
