[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "rag-mcp"
version = "0.6.1"
description = "MCP server for IR knowledge base semantic search over 23 authoritative sources"
license = "MIT"
authors = [
    { name = "AppliedIncidentResponse.com" }
]
requires-python = ">=3.10"
keywords = ["mcp", "rag", "security", "incident-response", "semantic-search"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Security",
]
dependencies = [
    "mcp>=1.26",
    # sentence-transformers stays a REQUIRED runtime dependency: it embeds the
    # query for kb_search_knowledge against the pgvector store (BATCH-OSX-RAG).
    "sentence-transformers>=2.2",
    "pyyaml>=6.0",
    "toml>=0.10",
    "sift-common",
    "zstandard>=0.20",
]

[project.optional-dependencies]
# chromadb is only needed for the legacy Chroma->pgvector import/seed CLI path,
# not for the runtime pgvector knowledge tools. BATCH-OSX-RAG makes it optional.
chroma-import = [
    "chromadb>=1.0",
]
dev = [
    "pytest>=7.0",
    "pytest-asyncio>=0.21",
    "chromadb>=1.0",
]

[project.scripts]
rag-mcp = "rag_mcp.server:main"
rag-mcp-seed-pgvector = "rag_mcp.pgvector_seed:main"
rag-mcp-import-chroma-pgvector = "rag_mcp.pgvector_chroma_import:main"

[tool.hatch.build.targets.wheel]
packages = ["src/rag_mcp"]
