name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check .
      - run: ruff format --check .

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install sift-common (from sift-mcp monorepo)
        run: pip install "sift-common @ git+https://github.com/AppliedIR/sift-mcp.git#subdirectory=packages/sift-common"

      - name: Install package with test deps
        run: pip install -e ".[test]"

      - name: Run tests
        run: pytest tests/ -v --tb=short
