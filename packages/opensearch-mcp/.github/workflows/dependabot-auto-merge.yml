name: Dependabot auto-merge

# Auto-merge Dependabot PRs once CI passes — patch + minor bumps only.
# Major version bumps require manual review because semver allows breaks.
#
# Branch protection still enforces lint + 3-version test matrix; this
# workflow merely turns on GitHub's --auto flag, which waits for those
# checks to go green before squash-merging. If CI fails, nothing merges
# and the PR sits for human review.

on: pull_request_target

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge for patch/minor bumps
        if: |
          steps.meta.outputs.update-type == 'version-update:semver-patch' ||
          steps.meta.outputs.update-type == 'version-update:semver-minor'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
