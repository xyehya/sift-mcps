services:
  opensearch:
    image: opensearchproject/opensearch:3.5.0
    container_name: sift-opensearch
    environment:
      - discovery.type=single-node
      - OPENSEARCH_JAVA_OPTS=-Xms4g -Xmx4g
      # PMI1: security plugin disabled; :9200 is bound to loopback only (the
      # security boundary). Plain http, no TLS/admin password. Matches the root
      # docker-compose.yml posture and the install.sh http(no-auth) client path.
      - DISABLE_SECURITY_PLUGIN=true
    ports:
      - "127.0.0.1:9200:9200"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    mem_limit: 6g
    restart: unless-stopped

volumes:
  opensearch-data:
