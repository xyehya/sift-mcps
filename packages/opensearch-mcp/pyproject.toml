[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"

[project]
name = "opensearch-mcp"
dynamic = ["version"]
description = "OpenSearch MCP server for forensic evidence indexing and querying"
requires-python = ">=3.10"
license = {text = "MIT"}
dependencies = [
    "fastmcp>=3",
    "opensearch-py>=2.4",
    "evtx>=0.8",
    "mcp>=1.26",
    "pyyaml>=6.0.3",
    "sift-core",
    "sift-common",
    "regipy>=4.0",
    "python-dateutil>=2.9.0.post0",
    "defusedxml>=0.7",
]

[project.scripts]
opensearch-mcp = "opensearch_mcp.server:main"
opensearch-ingest = "opensearch_mcp.ingest_cli:main"
# feat/opensearch-workers: dedicated least-privilege ingest/enrich worker. Runs
# the durable job loop restricted to the opensearch lane; the systemd template
# sift-opensearch-worker@.service starts N of these (the only unit with the
# MountFlags=shared namespace FUSE needs). Reuses the sift-core job worker main;
# importing opensearch_mcp.ingest_job wires the ingest/enrich handlers.
sift-opensearch-worker = "sift_core.execute.job_worker_cli:main"

[project.entry-points."sift.plugins"]
opensearch = "opensearch_mcp.sift_plugin:register"

[project.optional-dependencies]
http = ["uvicorn>=0.20", "starlette"]
test = [
    "pytest>=7.0",
    "pytest-timeout>=2.0",
]

# Version single source of truth (#15/I-PS1): derived from the git release tag
# via hatch-vcs — no hand-edited literal. See root pyproject.toml for the full
# rationale; `--match v*` ignores the repo's non-PEP440 tags.
[tool.hatch.version]
source = "vcs"
fallback-version = "0.6.2"
tag-pattern = "^v(?P<version>\\d+\\.\\d+\\.\\d+.*)$"

[tool.hatch.version.raw-options]
git_describe_command = ["git", "describe", "--dirty", "--tags", "--long", "--match", "v*"]

[tool.hatch.build.targets.wheel]
packages = ["src/opensearch_mcp"]

[tool.ruff]
target-version = "py310"
line-length = 99

[tool.ruff.lint]
select = ["E", "F", "I", "W"]

[tool.ruff.lint.per-file-ignores]
"tests/generate_test_data.py" = ["E501"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["tests"]
markers = [
    "integration: tests requiring OpenSearch Docker container",
]
