[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "opensearch-mcp"
version = "0.6.1"
description = "OpenSearch MCP server for forensic evidence indexing and querying"
requires-python = ">=3.10"
license = {text = "MIT"}
dependencies = [
    "fastmcp>=3",
    "opensearch-py>=2.4",
    "evtx>=0.8",
    "mcp>=1.26",
    "pyyaml>=6.0.3",
    "sift-core",
    "sift-common",
    "regipy>=4.0",
    "python-dateutil>=2.9.0.post0",
    "defusedxml>=0.7",
]

[project.scripts]
opensearch-mcp = "opensearch_mcp.server:main"
opensearch-ingest = "opensearch_mcp.ingest_cli:main"

[project.entry-points."sift.plugins"]
opensearch = "opensearch_mcp.sift_plugin:register"

[project.optional-dependencies]
http = ["uvicorn>=0.20", "starlette"]
test = [
    "pytest>=7.0",
    "pytest-timeout>=2.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/opensearch_mcp"]

[tool.ruff]
target-version = "py310"
line-length = 99

[tool.ruff.lint]
select = ["E", "F", "I", "W"]

[tool.ruff.lint.per-file-ignores]
"tests/generate_test_data.py" = ["E501"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["tests"]
markers = [
    "integration: tests requiring OpenSearch Docker container",
]
