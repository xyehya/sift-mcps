# High-value Event IDs for --reduced mode
# Covers core IR detection across ATT&CK tactics
#
# IMPORTANT: Some Event IDs appear in multiple channels with different
# meanings (e.g., ID 21 is RDP logon in TerminalServices AND WMI
# consumer binding in Sysmon; ID 25 is RDP reconnection AND Sysmon
# process tampering). The reduced mode filter matches on Event ID
# alone — this means including ID 21 keeps BOTH the RDP and Sysmon
# events. This is acceptable: false inclusions are safe (extra data),
# while false exclusions would lose evidence. Channel-aware filtering
# would require (channel, event_id) tuples — added complexity for
# minimal benefit in reduced mode.

authentication:
  - 4624   # successful logon
  - 4625   # failed logon
  - 4634   # logoff
  - 4648   # explicit credentials
  - 4672   # special privileges assigned
  - 4768   # Kerberos TGT requested
  - 4769   # Kerberos service ticket
  - 4770   # Kerberos service ticket renewed
  - 4771   # Kerberos pre-auth failed
  - 4776   # NTLM authentication

account_management:
