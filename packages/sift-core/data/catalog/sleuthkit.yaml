category: sleuthkit

tools:
  - name: fls
    binary: fls
    input_style: positional
    output_format: text
    timeout_seconds: 600
    interactive: false
    description: "List files and directories in a disk image"
    fk_tool_name: fls

  - name: icat
    binary: icat
    input_style: positional
    output_format: text
    timeout_seconds: 600
    interactive: false
    description: "Extract file by inode from disk image"
    fk_tool_name: icat

  - name: mmls
    binary: mmls
    input_style: positional
    output_format: text
    timeout_seconds: 300
    interactive: false
    description: "Display partition table layout"
    fk_tool_name: mmls

  - name: blkls
    binary: blkls
    input_style: positional
    output_format: text
    timeout_seconds: 3600
    interactive: false
    description: "Extract unallocated disk clusters"
    fk_tool_name: blkls

  - name: img_stat
    binary: img_stat
    input_style: positional
    output_format: text
    timeout_seconds: 300
    interactive: false
    description: "Display details of a disk image file"
    fk_tool_name: img_stat

  - name: fsstat
    binary: fsstat
    input_style: positional
    output_format: text
    timeout_seconds: 300
    interactive: false
    description: "Display general details of a file system"
    fk_tool_name: fsstat

  - name: ewfinfo
    binary: ewfinfo
    input_style: positional
    output_format: text
    timeout_seconds: 300
    interactive: false
    description: "Show metadata stored in EWF files"
    fk_tool_name: ewfinfo

  - name: ewfverify
    binary: ewfverify
    input_style: positional
    output_format: text
    timeout_seconds: 7200
    interactive: false
    description: "Verify the integrity of EWF files"
    fk_tool_name: ewfverify
