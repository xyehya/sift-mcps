[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "sift-core"
version = "0.1.0"
description = "Shared core library for the SIFT Protocol Gateway: case I/O, identity, approval auth, HMAC verification"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "AppliedIncidentResponse.com" }]
keywords = ["forensics", "incident-response", "dfir", "security"]
dependencies = [
    "forensic-knowledge",
    "pyyaml>=6.0",
    "sift-common",
]

[project.scripts]
sift-job-worker = "sift_core.execute.job_worker_cli:main"

[project.optional-dependencies]
dev = [
    "pytest>=9.0",
    "pytest-cov>=4.0",
]
solana = [
    "solders>=0.21",
]

[tool.hatch.build.targets.wheel]
packages = ["src/sift_core"]

[tool.hatch.build.targets.wheel.force-include]
"data" = "sift_core/data"

[tool.hatch.build.targets.sdist]
include = ["src/", "data/", "tests/"]

[tool.pytest.ini_options]
testpaths = ["tests"]
