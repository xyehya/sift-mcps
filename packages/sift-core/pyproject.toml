[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"

[project]
name = "sift-core"
dynamic = ["version"]
description = "Shared core library for the SIFT Protocol Gateway: case I/O, identity, approval auth, HMAC verification"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "AppliedIncidentResponse.com" }]
keywords = ["forensics", "incident-response", "dfir", "security"]
dependencies = [
    "forensic-knowledge",
    "pyyaml>=6.0",
    "sift-common",
]

[project.scripts]
dfir-exec-launcher = "sift_core.execute.dfir_exec_launcher:main"
sift-job-worker = "sift_core.execute.job_worker_cli:main"

[project.optional-dependencies]
dev = [
    "pytest>=9.0",
    "pytest-cov>=4.0",
]
solana = [
    "solders>=0.21",
]

# Version single source of truth (#15/I-PS1): derived from the git release tag
# via hatch-vcs — no hand-edited literal. See root pyproject.toml for the full
# rationale; `--match v*` ignores the repo's non-PEP440 tags.
[tool.hatch.version]
source = "vcs"
fallback-version = "0.6.2"
tag-pattern = "^v(?P<version>\\d+\\.\\d+\\.\\d+.*)$"

[tool.hatch.version.raw-options]
git_describe_command = ["git", "describe", "--dirty", "--tags", "--long", "--match", "v*"]

[tool.hatch.build.targets.wheel]
packages = ["src/sift_core"]

[tool.hatch.build.targets.wheel.force-include]
"data" = "sift_core/data"

[tool.hatch.build.targets.sdist]
include = ["src/", "data/", "tests/"]

[tool.pytest.ini_options]
testpaths = ["tests"]
