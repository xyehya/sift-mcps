[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"

[project]
name = "sift-gateway"
dynamic = ["version"]
description = "HTTP gateway aggregating SIFT-local MCP servers behind one endpoint"
requires-python = ">=3.10"
license = {text = "MIT"}
authors = [
    {name = "AppliedIncidentResponse.com"},
]
dependencies = [
    "fastapi>=0.136",
    "fastmcp>=3",
    "mcp>=1.26",
    "uvicorn>=0.30",
    "starlette>=0.49.1",
    "pyyaml>=6.0",
    "httpx>=0.27",
    "bcrypt>=4.0",
    "jsonschema>=4.18",
    "psycopg[binary]>=3.2",
    "sift-common",
    "sift-core",
]

[project.scripts]
sift-gateway = "sift_gateway.__main__:main"

[project.optional-dependencies]
dev = ["pytest>=7.0", "pytest-cov>=4.0", "pytest-asyncio>=0.21"]

# Version single source of truth (#15/I-PS1): derived from the git release tag
# via hatch-vcs — no hand-edited literal. See root pyproject.toml for the full
# rationale; `--match v*` ignores the repo's non-PEP440 tags.
[tool.hatch.version]
source = "vcs"
fallback-version = "0.6.2"
tag-pattern = "^v(?P<version>\\d+\\.\\d+\\.\\d+.*)$"

[tool.hatch.version.raw-options]
git_describe_command = ["git", "describe", "--dirty", "--tags", "--long", "--match", "v*"]

[tool.hatch.build.targets.wheel]
packages = ["src/sift_gateway"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
