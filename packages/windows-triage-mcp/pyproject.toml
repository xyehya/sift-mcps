[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "windows-triage-mcp"
version = "0.1.0"
description = "SIFT-local Windows baseline validation MCP backend"
requires-python = ">=3.10"
license = {text = "MIT"}
authors = [{name = "AppliedIncidentResponse.com"}]
dependencies = [
    "mcp>=1.26",
    "pyyaml>=6.0",
    "python-registry>=1.3",
    "sift-common",
    "zstandard>=0.20",
]

[project.scripts]
windows-triage-mcp = "windows_triage_mcp.server:main"

[project.optional-dependencies]
test = [
    "pytest>=7.0",
    "pytest-asyncio>=0.21",
]

[tool.hatch.build.targets.wheel]
packages = ["src/windows_triage_mcp"]

