[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"

[project]
name = "windows-triage-mcp"
dynamic = ["version"]
description = "SIFT-local Windows baseline validation MCP backend"
requires-python = ">=3.10"
license = {text = "MIT"}
authors = [{name = "AppliedIncidentResponse.com"}]
dependencies = [
    "fastmcp>=3",
    "mcp>=1.26",
    "pyyaml>=6.0",
    "python-registry>=1.3",
    "sift-common",
    "zstandard>=0.20",
]

[project.scripts]
windows-triage-mcp = "windows_triage_mcp.server:main"

[project.optional-dependencies]
test = [
    "pytest>=7.0",
    "pytest-asyncio>=0.21",
]

# Version single source of truth (#15/I-PS1): derived from the git release tag
# via hatch-vcs — no hand-edited literal. See root pyproject.toml for the full
# rationale; `--match v*` ignores the repo's non-PEP440 tags.
[tool.hatch.version]
source = "vcs"
fallback-version = "0.6.2"
tag-pattern = "^v(?P<version>\\d+\\.\\d+\\.\\d+.*)$"

[tool.hatch.version.raw-options]
git_describe_command = ["git", "describe", "--dirty", "--tags", "--long", "--match", "v*"]

[tool.hatch.build.targets.wheel]
packages = ["src/windows_triage_mcp"]
